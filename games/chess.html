<style>
:root{
  --bg:#0b1020;
  --card:#151b2e;
  --soft:#1f2942;
  --text:#f8fafc;
  --muted:#94a3b8;
  --primary:#7c5cff;
  --gold:#facc15;
  --danger:#fb7185;
  --green:#22c55e;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:radial-gradient(circle at top,#243056 0,#0b1020 48%);
  color:var(--text);
  min-height:100vh;
}

.chess-page{
  max-width:520px;
  margin:auto;
  padding:18px 16px 110px;
}

.header{
  text-align:center;
  margin-bottom:18px;
}

.header h1{
  margin:0;
  font-size:1.7rem;
}

.header p{
  margin:6px 0 0;
  color:var(--muted);
  font-size:.9rem;
}

.panel{
  background:rgba(21,27,46,.88);
  border:1px solid rgba(255,255,255,.08);
  border-radius:22px;
  padding:16px;
  box-shadow:0 20px 45px rgba(0,0,0,.35);
  backdrop-filter:blur(12px);
}

.controls{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:14px;
}

.control{
  background:var(--soft);
  border-radius:16px;
  padding:10px;
}

.control label{
  display:block;
  color:var(--muted);
  font-size:.75rem;
  margin-bottom:6px;
}

select,button{
  width:100%;
  border:none;
  border-radius:12px;
  padding:10px 12px;
  font-weight:700;
}

select{
  background:#0f172a;
  color:var(--text);
}

select:disabled, button:disabled{
  opacity:.5;
  cursor:not-allowed;
}

button{
  background:linear-gradient(135deg,var(--primary),#4f46e5);
  color:white;
  cursor:pointer;
}

button:active{transform:scale(.98)}

.board-wrap{
  background:#0f172a;
  border-radius:18px;
  padding:10px;
  overflow:hidden;
  position:relative;
}

.start-overlay{
  position:absolute;
  inset:0;
  background:rgba(11,16,32,.92);
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:18px;
  z-index:20;
  backdrop-filter:blur(2px);
  transition:opacity .2s ease;
}

.start-overlay.hidden{
  display:none;
}

.start-overlay button{
  width:auto;
  padding:14px 34px;
  font-size:1rem;
  border-radius:14px;
}

.legal-move-highlight{
  box-shadow:inset 0 0 0 9999px rgba(124,92,255,.45)!important;
}

#board{
  width:100%;
  max-width:460px;
  margin:auto;
}

.status-box{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin:14px 0;
}

.status-card{
  background:var(--soft);
  border-radius:16px;
  padding:12px;
  text-align:center;
}

.status-card span{
  display:block;
  font-size:.72rem;
  color:var(--muted);
}

.status-card strong{
  font-size:1.2rem;
}

.status-card.active{
  box-shadow:0 0 0 2px var(--primary) inset;
}

#gameStatus{
  background:rgba(124,92,255,.14);
  border:1px solid rgba(124,92,255,.25);
  border-radius:16px;
  padding:12px;
  font-size:.9rem;
  color:#ddd6fe;
  text-align:center;
  min-height:1.2em;
}

.move-list{
  margin-top:14px;
  max-height:130px;
  overflow:auto;
  background:#0f172a;
  border-radius:14px;
  padding:10px;
  color:var(--muted);
  font-size:.82rem;
  line-height:1.7;
}

.engine-note{
  text-align:center;
  font-size:.72rem;
  color:var(--muted);
  margin-top:10px;
}

.theme-classic .white-1e1d7{background:#f0d9b5!important}
.theme-classic .black-3c85d{background:#b58863!important}

.theme-green .white-1e1d7{background:#d9f99d!important}
.theme-green .black-3c85d{background:#15803d!important}

.theme-blue .white-1e1d7{background:#dbeafe!important}
.theme-blue .black-3c85d{background:#2563eb!important}

.theme-gold .white-1e1d7{background:#fde68a!important}
.theme-gold .black-3c85d{background:#92400e!important}

@media(max-width:420px){
  .controls{grid-template-columns:1fr}
}
  .selected-square{
  box-shadow:inset 0 0 0 9999px rgba(250,204,21,.38)!important;
}

.lifted-piece img{
  transform:scale(1.22);
  filter:drop-shadow(0 14px 12px rgba(0,0,0,.45));
  transition:.15s ease;
  z-index:9;
  position:relative;
}

#board .square-55d63{
  cursor:pointer;
}

    .selected-square{
  box-shadow:inset 0 0 0 9999px rgba(250,204,21,.38)!important;
}

.lifted-piece img{
  transform:scale(1.22);
  filter:drop-shadow(0 14px 12px rgba(0,0,0,.45));
  transition:.15s ease;
  z-index:9;
  position:relative;
}

#board .square-55d63{
  cursor:pointer;
}

  .compact-actions{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin:14px 0;
}

#settingsPanel{
    overflow:hidden;
    transition:.35s ease;
}

#settingsPanel.hide{
    max-height:0;
    opacity:0;
    margin:0;
    padding:0;
    overflow:hidden;
}

#settingsPanel.show{
    max-height:500px;
    opacity:1;
}
</style>
</head>

<body>
  <div id="header"></div>
<main class="chess-page">
  <div class="header">
    <h1>Chess Legend</h1>
  </div>

  <section class="panel">
    <div class="board-wrap">
      <div id="board"></div>
      <div class="start-overlay" id="startOverlay">
        <button id="startBtn" onclick="newGame()" disabled>Memuat engine...</button>
      </div>
      <div class="compact-actions">
    <button onclick="toggleSettings()">⚙️ Pengaturan</button>
    <button onclick="newGame()">🔄 Game Baru</button>
</div>
    </div>

    <div class="status-box">
      <div class="status-card" id="whiteCard">
        <span>Kamu</span>
        <strong id="whiteTime">03:00</strong>
      </div>
      <div class="status-card" id="blackCard">
        <span>AI</span>
        <strong id="blackTime">03:00</strong>
      </div>
    </div>
     <div class="controls" id="settingsPanel">
      <div class="control">
        <label>Level AI</label>
        <select id="level">
          <option value="1">Level 1 - Pemula</option>
          <option value="2">Level 2 - Santai</option>
          <option value="3">Level 3 - Menengah</option>
          <option value="4">Level 4 - Master</option>
          <option value="5">Level 5 - Legend</option>
        </select>
      </div>

      <div class="control">
        <label>Waktu</label>
       <select id="timeMode">
  <option value="0">Tanpa Waktu</option>
  <option value="60">1 Menit</option>
  <option value="180" selected>3 Menit</option>
  <option value="600">10 Menit</option>
</select>
      </div>

      <div class="control">
        <label>Tema Papan</label>
        <select id="theme">
          <option value="classic">Classic</option>
          <option value="green">Hijau</option>
          <option value="blue">Biru</option>
          <option value="gold">Gold</option>
        </select>
      </div>

      <div class="control">
        <label>Game</label>
        <button id="newGameBtn" onclick="newGame()">Game Baru</button>
      </div>

      <div class="control">
        <label>Suara</label>
        <button id="soundToggleBtn" onclick="toggleSound()">🔊 Suara On</button>
      </div>
    </div>
    <div id="gameStatus">Memuat engine catur...</div>
    <div class="move-list" id="moveList">Belum ada langkah.</div>
    <div class="engine-note" id="engineNote"></div>
  </section>
</main>
 <div id="footer"></div>
  <script src="js/loader.js"></script>
<script>
let board;
let game = new Chess();
let engine = null;
let engineReady = false;
let playerTime = 180;
let aiTime = 180;
let timer = null;
let gameOver = false;
let pendingAIMove = false;
let gameStarted = false;

// Kombinasi skill level (0-20) + depth per level, biar terasa lebih manusiawi
// di level rendah dan benar-benar kuat di level atas.
const levelConfig = {
  1: { skill: 0,  depth: 2  },
  2: { skill: 5,  depth: 4  },
  3: { skill: 10, depth: 8  },
  4: { skill: 15, depth: 12 },
  5: { skill: 20, depth: 18 }
};

function setStatusText(text){
  document.getElementById("gameStatus").innerText = text;
}

// --- Sound effects (Web Audio API, tanpa file eksternal) ---
let audioCtx = null;
let soundEnabled = true;

function ensureAudioContext(){
  if(!audioCtx){
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return;
    audioCtx = new AC();
  }
  if(audioCtx.state === "suspended"){
    audioCtx.resume();
  }
}

function playTone(freq, duration, type, volume){
  if(!soundEnabled || !audioCtx) return;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = type || "sine";
  osc.frequency.value = freq;

  gain.gain.setValueAtTime(volume || 0.2, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playMoveTone(){
  playTone(520, 0.09, "sine", 0.18);
}

function playCaptureTone(){
  playTone(300, 0.12, "square", 0.16);
}

function playCheckTone(){
  playTone(760, 0.14, "triangle", 0.22);
  setTimeout(() => playTone(600, 0.14, "triangle", 0.18), 90);
}

function playGameOverTone(){
  playTone(220, 0.25, "sawtooth", 0.2);
  setTimeout(() => playTone(180, 0.35, "sawtooth", 0.18), 150);
}

function playStartTone(){
  playTone(440, 0.1, "sine", 0.15);
  setTimeout(() => playTone(660, 0.15, "sine", 0.15), 100);
}

function playSoundForMove(move){
  if(!move) return;

  if(game.game_over()){
    playGameOverTone();
  }else if(game.in_check()){
    playCheckTone();
  }else if(move.captured){
    playCaptureTone();
  }else{
    playMoveTone();
  }
}

function toggleSound(){
  soundEnabled = !soundEnabled;
  document.getElementById("soundToggleBtn").innerText = soundEnabled ? "🔊 Suara On" : "🔇 Suara Off";
  if(soundEnabled) ensureAudioContext();
}

// Path lokal ke file engine yang sudah kamu self-host.
// Download build single-file (asm.js, tanpa dependency wasm terpisah) dari:
// https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js
// lalu simpan sebagai data/chess/stockfish.js
const ENGINE_PATH = "data/chess/stockfish.js";

function initEngine(){
  return new Promise((resolve, reject) => {
    setStatusText("Memuat engine dari " + ENGINE_PATH + "...");

    // Worker dibuat lewat Blob (bukan langsung dari URL file), supaya Worker
    // ikut mewarisi Content-Security-Policy dari meta tag halaman ini
    // (termasuk 'unsafe-eval' yang dibutuhkan build asm.js Stockfish).
    // Worker dari URL file biasa TIDAK mewarisi CSP dari meta tag.
    fetch(ENGINE_PATH)
      .then(res => {
        if(!res.ok) throw new Error("HTTP " + res.status + " saat mengambil " + ENGINE_PATH);
        return res.text();
      })
      .then(code => {
        if(!code || code.length < 500) throw new Error("Isi file " + ENGINE_PATH + " kosong/tidak valid.");

        const blob = new Blob([code], { type: "application/javascript" });
        engine = new Worker(URL.createObjectURL(blob));
        attachEngineHandlers(resolve, reject);
        engine.postMessage("uci");
      })
      .catch(err => {
        console.error("Gagal memuat engine:", err);
        setStatusText(
          "Engine gagal dimuat: " + err.message + ". " +
          "Cek apakah file " + ENGINE_PATH + " benar-benar ada di repo, dan halaman dibuka lewat server (http://), bukan file://."
        );
        reject(err);
      });
  });
}

function attachEngineHandlers(resolve, reject){
    const readyTimeout = setTimeout(() => {
      if(!engineReady){
        reject(new Error(
          "Engine timeout - tidak merespon setelah 15 detik. " +
          "Cek apakah file " + ENGINE_PATH + " ada, dan pastikan halaman dibuka lewat server (http://), bukan dobel-klik file (file://)."
        ));
      }
    }, 15000);

    engine.onerror = function(err){
      console.error("Engine worker error:", err.message || err);
      clearTimeout(readyTimeout);
      setStatusText(
        "Engine error: file " + ENGINE_PATH + " tidak ditemukan / gagal dimuat. " +
        "Cek Console (F12) untuk detail, dan pastikan path-nya benar."
      );
      reject(err);
    };

    engine.onmessage = function(event){
      const line = event.data || "";

      if(line === "uciok"){
        engine.postMessage("isready");
        return;
      }

      if(line === "readyok" && !engineReady){
        engineReady = true;
        clearTimeout(readyTimeout);
        resolve();
        return;
      }

      if(line.startsWith("bestmove")){
        const moveText = line.split(" ")[1];

        if(moveText && moveText !== "(none)"){
          const aiMove = game.move({
            from: moveText.substring(0,2),
            to: moveText.substring(2,4),
            promotion: "q"
          });
          playSoundForMove(aiMove);
        }

        board.position(game.fen());
        pendingAIMove = false;
        updateStatus();
        updateMoveList();
        updateActiveCard();
      }
    };
}

function removeLegalHighlights(){
  $("#board .square-55d63").removeClass("legal-move-highlight");
}

function highlightLegalMoves(square){
  const moves = game.moves({ square: square, verbose: true });
  if(moves.length === 0) return;

  $("#board .square-" + square).addClass("legal-move-highlight");
  moves.forEach(m => {
    $("#board .square-" + m.to).addClass("legal-move-highlight");
  });
}

let selectedSquare = null;

function clearSelection(){
  selectedSquare = null;
  removeLegalHighlights();
  $("#board .square-55d63").removeClass("selected-square lifted-piece");
}

function selectSquare(square){
  clearSelection();

  const piece = game.get(square);

  if(!piece) return;
  if(piece.color !== "w") return;
  if(game.turn() !== "w") return;
  if(!gameStarted || gameOver || !engineReady || pendingAIMove) return;

  selectedSquare = square;

  $("#board .square-" + square).addClass("selected-square lifted-piece");
  highlightLegalMoves(square);
}

function tryMove(targetSquare){
  if(!selectedSquare) return;

  const move = game.move({
    from: selectedSquare,
    to: targetSquare,
    promotion: "q"
  });

  if(move === null){
    const targetPiece = game.get(targetSquare);

    if(targetPiece && targetPiece.color === "w"){
      selectSquare(targetSquare);
    }else{
      clearSelection();
    }

    return;
  }

  clearSelection();
  board.position(game.fen());

  playSoundForMove(move);
  updateStatus();
  updateMoveList();
  updateActiveCard();

  window.setTimeout(makeAIMove, 350);
}

function onSquareClick(square){
  if(!selectedSquare){
    selectSquare(square);
    return;
  }

  if(selectedSquare === square){
    clearSelection();
    return;
  }

  tryMove(square);
}

$("#board").on("click", ".square-55d63", function(){
  const classes = $(this).attr("class");
  const match = classes.match(/square-([a-h][1-8])/);

  if(!match) return;

  onSquareClick(match[1]);
});
  
function makeAIMove(){
  if(game.game_over() || !engineReady) return updateStatus();

  pendingAIMove = true;

  const level = document.getElementById("level").value;
  const config = levelConfig[level];

  engine.postMessage("setoption name Skill Level value " + config.skill);
  engine.postMessage("position fen " + game.fen());
  engine.postMessage("go depth " + config.depth);
}

function updateStatus(){
  let status = "";

  if(game.in_checkmate()){
    gameOver = true;
    status = game.turn() === "w" ? "Skakmat. AI menang." : "Skakmat. Kamu menang!";
    clearInterval(timer);
  }else if(game.in_draw()){
    gameOver = true;
    status = "Game seri.";
    clearInterval(timer);
  }else{
    status = game.turn() === "w" ? "Giliran kamu." : "AI sedang berpikir...";
    if(game.in_check()) status += " Raja sedang skak!";
  }

  setStatusText(status);
}

function updateActiveCard(){
  document.getElementById("whiteCard").classList.toggle("active", game.turn() === "w" && !gameOver);
  document.getElementById("blackCard").classList.toggle("active", game.turn() === "b" && !gameOver);
}

function updateMoveList(){
  const history = game.history();
  if(history.length === 0){
    document.getElementById("moveList").innerText = "Belum ada langkah.";
    return;
  }

  let html = "";
  for(let i=0;i<history.length;i+=2){
    html += ((i/2)+1) + ". " + history[i] + " " + (history[i+1] || "") + "<br>";
  }
  document.getElementById("moveList").innerHTML = html;
}

function formatTime(sec){
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");
}

function updateClock(){
  document.getElementById("whiteTime").innerText = formatTime(playerTime);
  document.getElementById("blackTime").innerText = formatTime(aiTime);
}

function startTimer(){
  if(playerTime === 0 && aiTime === 0){
    return;
}
  clearInterval(timer);
  timer = setInterval(() => {
    if(gameOver) return;

    if(game.turn() === "w"){
      playerTime--;
      if(playerTime <= 0){
        gameOver = true;
        setStatusText("Waktu habis. AI menang.");
        clearInterval(timer);
        playGameOverTone();
      }
    }else{
      aiTime--;
      if(aiTime <= 0){
        gameOver = true;
        setStatusText("Waktu AI habis. Kamu menang!");
        clearInterval(timer);
        playGameOverTone();
      }
    }

    updateClock();
  },1000);
}

  function toggleSettings(){
    document
        .getElementById("settingsPanel")
        .classList.toggle("hide");
}

function applyTheme(){
  document.body.classList.remove("theme-classic","theme-green","theme-blue","theme-gold");
  document.body.classList.add("theme-" + document.getElementById("theme").value);
}

function newGame(){
  gameStarted = true;

  document.getElementById("settingsPanel").classList.add("hide");
  document.getElementById("startOverlay").classList.add("hidden");

  ensureAudioContext();
  playStartTone();

  game = new Chess();
  gameOver = false;
  pendingAIMove = false;
  clearSelection();

  const selectedTime = Number(document.getElementById("timeMode").value);

  playerTime = selectedTime;
  aiTime = selectedTime;

  board.position("start");
  updateMoveList();
  applyTheme();
  updateActiveCard();

  if(selectedTime === 0){
    clearInterval(timer);
    document.getElementById("whiteTime").innerText = "∞";
    document.getElementById("blackTime").innerText = "∞";
  }else{
    updateClock();
  }

  if(engineReady){
    setStatusText("Giliran kamu.");

    if(selectedTime !== 0){
      startTimer();
    }
  }else{
    setStatusText("Menunggu engine siap...");
  }
}
  
// Disable kontrol sampai engine siap, supaya user tidak main sebelum AI bisa jalan
document.getElementById("newGameBtn").disabled = true;

initEngine()
  .then(() => {
    document.getElementById("newGameBtn").disabled = false;
    document.getElementById("engineNote").innerText = "Engine: Stockfish 10 (self-hosted)";

    const startBtn = document.getElementById("startBtn");
    startBtn.disabled = false;
    startBtn.innerText = "Mulai Main";
    setStatusText("Engine siap. Klik \"Mulai Main\" untuk memulai.");
  })
  .catch((err) => {
    console.error(err);
    document.getElementById("engineNote").innerText = "Engine gagal dimuat — cek path file & Console (F12).";
  });
</script>
</body>
